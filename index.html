    <body>
        <header>
            <h1>WorkWave</h1>
            <nav>
                <ul>
                    <li>
                        <a href="index.html"><i class="fa-solid fa-house"></i></a>
                    </li>
                    <li>
                        <a href="Login.html"><i class="fa-solid fa-arrow-right-to-bracket"></i></a>

                        <a href="Signup.html"><i class="fa-solid fa-user-plus"></i></a>
                    </li>
                </ul>
            </nav>
        </header>
        <hr>
        <section>
            <h2>Look for your own job</h2>
            <form action="#" method="get">
                <label for="job-title"> Job Title :</label>
                <input
                    type="search"
                    id="job-title"
                    name="job-title"
                    placeholder=" Software Engineer , Front-end Developer , Back-end Developer and so on ....."
                >
                <br>
                <label for="experience">Years of experience :</label>
                <input
                    type="number"
                    name="experience"
                    id="experience"
                    min="0"
                    max="30"
                >
                <button type="submit">Search Jobs</button>
            </form>
        </section>
        <br>
        <hr>
        <section id="add-job-section">
            <h3>Add New Job (Admin)</h3>
            <form action="" id="add-job-form">
                <input type="text" id="new-tile" placeholder="job-title" required>
                <input type="text" id="new company" placeholder="Company" required>
                <input type="text" id="new-salary" placeholder="Salary (e.g.20k)">
                <input type="text" id="new-exp" placeholder="Experience (1-3 years)" required>
                <button type="submit">Add Job</button>
            </form>
        </section>
