    <main>
        <h2>Add New Jop</h2>
    </main>
    <form method="post" id="form">
     
        
         <div>
            <label for="title">Jop Title: </label>
            <br>
            <input id="title" type="text"  name=" title" >
             <span id="tit" style="color: red; font: size 8px; display: none;font-family: 'Courier New', Courier, monospace;">title is required</span>
        </div>
        <br>
        <div>
            <label for="company">Company : </label>
            <input id="company" type="text"  name="company"  required>
        </div>
        <br>
        <div>
            <label for="experience">Experience Required : </label>
            <input id="experience required" type="text"  name="experience required"  required>
        </div>
        <br>
        <div>
            <label for="salary">Salary: </label>
            <br>
            <input id="salary" type="number"  name="salary"  >
             <span id="sal" style="color: red; font: size 8px;display: none;font-family: 'Courier New', Courier, monospace; ">Salary is required</span>
        </div>
        <br>
        <div>
            <label for="description">Description: </label>
            <br>
            <textarea id="description" name="description" rows="6"  cols="50" ></textarea>
            <span id="des" style="color: red; font: size 8px;display: none;font-family: 'Courier New', Courier, monospace; ">Description is required</span>
        </div>
        <br>
        <div>
            <label for="status"> Jop Status: </label>
            <br>
            <select id="status" name="status" required>
                <option value="open">Open</option>
                <option value="closed">Closed</option>
            </select>   
        </div>
        <br>
        <div>
            <button type="submit" id="btn" > Add Jop</button>
        </div>
      
    </form>
