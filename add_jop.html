    <main>
        <h1>Add New Jop</h1>
    </main>
    <form method="post">
       <fieldset>
        <legend>Add Jop Form</legend> 
         <div>
            <label for="title">Jop Title : </label>
            <input id="title" type="text"  name=" title" required>
        </div>
        <br>
        <div>
            <label for="salary">Salary : </label>
            <input id="salary" type="number"  name="salary"  required>
        </div>
        <br>
        <div>
            <label for="description">Description : </label>
            <textarea id="description" name="description" rows="6"  cols="50" required></textarea>
        </div>
        <br>
        <div>
            <label for="status"> Jop Status : </label>
            <select id="status" name="status" required>
                <option value="open">Open</option>
                <option value="closed">Closed</option>
            </select>   
        </div>
        <br>
        <div>
            <input type="submit" value="Add Jop">
        </div>
       </fieldset>
    </form>
