<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Details Page</title>
</head>
<body>
    <h1> Full-stack Developer </h1>
    <ul type="disc">
        <li><strong> Company Name: GAP </strong></li>
        <li><strong> Salary: 30,000</strong></li> 
        <li id="jobStatus" color="green"><strong> Job State: Open </strong></li>
        <li><strong> Experience Years: 2 years </strong></li>
        <br/>
        <h3>Job Description</h3>
        <p> Developing website Applications With Python </p>
    </ul>
    <button type="button" id="idBtn" class="main-button" data-job-id="102">
        Apply for this job
    </button>
    <script>
        const statuselement = document.getElementById('jobStatus');
        
        const myButton = document.getElementById('idBtn');
        myButton.addEventListener('click', function(){
            alert('Thank! We get your request to job number ' + this.getAttribute('data-job-id'));
            this.innerText='Applied';
            this.displayed= true;
            this.style.backgroundColor = 'green';
            statuselement.innerText = 'Status: Closed';
            statuselement.style.color = 'red';
            statuselement.style.fontWeight =  'bold';
        });
    </script>
</body>
</html>
