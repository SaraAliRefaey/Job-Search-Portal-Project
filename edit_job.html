   <main>
    <h1>Update Jop</h1>
   </main>
   <form method="post">
    <fieldset>
        <legend>Login Form</legend> 
         <div>
            <label for="title">Jop Title : </label>
            <input id="title" type="text"  name=" title" value="Software Engineer" required>
        </div>
        <br>
        <div>
            <label for="salary">Salary : </label>
            <input id="salary" type="number"  name="salary" value="20000"  required>
        </div>
        <br>
        <div>
            <label for="description">Description : </label>
            <textarea id="description" name="description" rows="6" cols="50" required>Develop and maintain web applications,collaborate with cross-functional teams, and write clean, efficient code.
            </textarea>
        </div>
        <br>
        <div>
            <label for="status"> Jop Status : </label>
            <select id="status" name="status" required>
                <option value="open">Open</option>
                <option value="closed">Closed</option>
            </select>   
        </div>
        <br>
        <div>
            <input type="submit" value="Update Jop">
        </div>
       </fieldset>
    </form>
